name: Wyckoff Scanner Pipeline

on:
  schedule:
    - cron: '0 * * * *'  # Esegue allo scoccare di ogni ora
  workflow_dispatch:     # Permette di testarlo manualmente cliccando su "Run workflow"

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v2

      - name: Configura Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'

      - name: Installa le dipendenze
        run: pip install -r requirements.txt

      - name: Esecuzione Scanner
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py
