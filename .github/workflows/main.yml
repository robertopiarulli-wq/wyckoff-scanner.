name: run-scanner

on:
  schedule:
    - cron: '0 * * * *' # Gira ogni ora al minuto 0
  workflow_dispatch: # Ti permette di avviarlo manualmente dalla scheda Actions

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance requests pandas numpy mplfinance supabase

      - name: Run script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          TELEGRAM_CHAT_ID: ${{ secrets.CHAT_ID }} # Doppia sicurezza per il codice
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python main.py
